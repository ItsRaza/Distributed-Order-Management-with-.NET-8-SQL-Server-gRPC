version: '3.9'

services:

  # Shard 0 — Asia-Pacific
  sqlserver-shard0:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: rs_shard0
    environment:
      SA_PASSWORD: "RegionShard@2024"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - shard0_data:/var/opt/mssql

  # Shard 1 — Middle East
  sqlserver-shard1:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: rs_shard1
    environment:
      SA_PASSWORD: "RegionShard@2024"
      ACCEPT_EULA: "Y"
    ports:
      - "1434:1433"
    volumes:
      - shard1_data:/var/opt/mssql

  # Shard 2 — Americas
  sqlserver-shard2:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: rs_shard2
    environment:
      SA_PASSWORD: "RegionShard@2024"
      ACCEPT_EULA: "Y"
    ports:
      - "1435:1433"
    volumes:
      - shard2_data:/var/opt/mssql

volumes:
  shard0_data:
  shard1_data:
  shard2_data:
